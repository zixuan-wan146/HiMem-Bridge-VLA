[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
  "reference-paper",
  "referen-repo",
  "reference-repo",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"evaluations/libero/*.py" = ["E402"]
"scripts/*.py" = ["E402"]
"tests/*.py" = ["E402"]
