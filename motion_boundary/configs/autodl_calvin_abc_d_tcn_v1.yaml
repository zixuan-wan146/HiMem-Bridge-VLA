seed: 42

data:
  root: /root/autodl-tmp/datasets/calvin/lerobot/task_ABC_D
  boundary_jsonl: /root/autodl-tmp/datasets/calvin/annotations/task_ABC_D_boundaries_actual.jsonl
  action_keys: [actions, action, rel_actions]
  state_keys: [state, observation.state, robot_obs]
  episode_keys: [episode_index, episode_id]
  frame_keys: [frame_index]
  window_size: 32
  positive_radius: 2
  ignore_radius: 6
  hard_negative_radius: 30
  label_sigma: 2.0
  soft_labels: true
  val_fraction: 0.1
  split_by: trajectory

features:
  use_action: true
  use_state: true
  use_delta_action: true
  use_delta_state: true
  use_gripper_transition: true
  normalize: false

model:
  hidden_dim: 768
  kernel_size: 5
  dilations: [1, 2, 4, 8, 16, 32]
  dropout: 0.15
  mlp_hidden_dim: 256

training:
  batch_size: 6144
  epochs: 20
  lr: 2.0e-4
  weight_decay: 1.0e-4
  num_workers: 4
  epoch_size: 262144
  positive_ratio: 0.5
  hard_negative_ratio: 0.25
  pos_weight: sqrt_neg_pos
  grad_clip_norm: 1.0

evaluation:
  event_tolerance: 3
  cooldown: 10
  threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  planner_recall_target: 0.90
  memory_precision_target: 0.95

outputs:
  run_dir: /root/autodl-tmp/HiMem-Bridge-VLA/motion_boundary/outputs/calvin_abc_d_tcn_v1
