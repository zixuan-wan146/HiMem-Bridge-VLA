name: CI

on:
  push:
  pull_request:

jobs:
  lightweight-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lightweight development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run repository checks
        run: EVO1_CHECK_REQUIRE_RUFF=1 scripts/check_repo.sh
