seed: 42

data:
  root: /root/autodl-tmp/datasets/calvin/lerobot/task_ABC_D
  transition_jsonl: /root/autodl-tmp/datasets/calvin/annotations/task_ABC_D_boundaries_actual.jsonl
  action_keys: [actions, action, rel_actions]
  state_keys: [state, observation.state, robot_obs]
  episode_keys: [episode_index, episode_id]
  frame_keys: [frame_index]
  window_size: 32
  label_mode: symmetric
  positive_radius: 2
  ignore_radius: 6
  hard_negative_radius: 30
  label_sigma: 2.0
  soft_labels: true
  val_fraction: 0.1
  split_by: trajectory

features:
  use_action: true
  use_state: true
  use_delta_action: true
  use_delta_state: true
  use_gripper_transition: true
  normalize: false

training:
  batch_size: 12288
  num_workers: 4

evaluation:
  event_tolerance: 3
  cooldown: 10
  threshold_grid: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.525, 0.55, 0.575, 0.60, 0.625, 0.65, 0.675, 0.70, 0.725, 0.75, 0.775, 0.80, 0.825, 0.85, 0.875, 0.90, 0.925, 0.95]
  planner_recall_target: 0.90
  planner_precision_floor: 0.70
  memory_precision_target: 0.85

outputs:
  run_dir: /root/autodl-tmp/HiMem-Bridge-VLA/transition_trigger/outputs/calvin_abc_d_heuristics
