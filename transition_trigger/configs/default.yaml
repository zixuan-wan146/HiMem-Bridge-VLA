seed: 42

data:
  format: segmented_parquet
  root: datasets/<benchmark>/subset
  transition_jsonl: datasets/<benchmark>/annotations/transitions.jsonl
  action_keys: [rel_actions, action, actions]
  state_keys: [robot_obs, observation.state, state]
  frame_keys: [frame_index, frame_idx]
  global_frame_keys: [index, global_index, global_frame_idx]
  episode_keys: [episode_index, episode_id]
  window_size: 32
  label_mode: causal_post
  positive_radius: 2
  ignore_radius: 6
  positive_pre_frames: null
  positive_post_frames: null
  ignore_pre_frames: null
  ignore_post_frames: null
  positive_min_delay: 1
  positive_max_delay: 5
  ignore_min_delay: -6
  ignore_max_delay: 0
  hard_negative_radius: 30
  label_sigma: 2.0
  soft_labels: true
  val_fraction: 0.1
  split_by: trajectory
  split_manifest: null
  train_split: train
  eval_split: eval
  test_split: test
  datasets: []

features:
  mode: flat
  feature_set: flat
  expected_input_dim: null
  use_action: true
  use_state: true
  use_delta_action: true
  use_delta_state: true
  use_gripper_transition: true
  include_deltas: true
  include_value_mask: true
  source_one_hot:
    enabled: false
    names: []
  blocks: []
  normalize: false

model:
  type: ssm
  d_model: 256
  num_layers: 4
  state_dim: 64
  num_heads: 8
  mlp_ratio: 4.0
  max_seq_len: 64
  pooling: last
  head_hidden_dim: 256
  dropout: 0.1

training:
  batch_size: 256
  epochs: 20
  lr: 3.0e-4
  weight_decay: 1.0e-4
  num_workers: 4
  epoch_size: 20000
  sampler: balanced
  positive_ratio: 0.5
  hard_negative_ratio: 0.25
  loss: bce
  pos_weight: sqrt_neg_pos
  focal_gamma: 2.0
  focal_alpha: null
  grad_clip_norm: 1.0

evaluation:
  event_tolerance: 3
  match_min_delay: 1
  match_max_delay: 5
  early_tolerance: 6
  cooldown: 10
  threshold_grid: [0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.85, 0.90, 0.95]
  planner_recall_target: 0.90
  planner_precision_floor: 0.0
  memory_write_fixed_threshold: 0.80
  memory_precision_target: 0.80
  memory_recall_floor: 0.0
  dataset_split: eval

trigger_policy:
  planner_threshold: 0.50
  memory_write_threshold: 0.80
  memory_write_implies_plan: true

outputs:
  run_dir: transition_trigger/outputs/default_run
