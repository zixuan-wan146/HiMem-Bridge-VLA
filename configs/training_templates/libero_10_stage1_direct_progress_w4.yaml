run_name: libero_10_stage1_direct_progress_w4
seed: 42
deterministic: false

bridge_himem_config: configs/bridge_himem/experiments/direct_progress_w4.yaml
load_vlm: false

dataset_type: memory_token_cache
dataset_config_path: local_data/token_caches/libero_10_memory_replay_internvl3_hidden_l3_6_9_12_s16_dedup_parts4/manifest.json
dataset_config_base_dir: .
cache_dir: local_data/cache/himem_bridge_vla/libero_10_stage1

save_dir: local_data/runs/stage1/libero_10_direct_progress_w4
disable_wandb: true
disable_swanlab: true

horizon: 32
per_action_dim: 7
state_dim: 8
memory_entry_tokens: 16
num_layers: 8
action_head_ffn_dim: 3584
num_plan_slots: 8
short_memory_time_bins: 2
max_vlm_tokens:

finetune_vlm: false
finetune_action_head: true
finetune_progress_planner: false
finetune_coarse_planner: false

enable_bridge_aux_loss: false
enable_coarse_planner_loss: false

max_steps: 10000
warmup_steps: 1000
batch_size: 32
num_workers: 4
log_interval: 10
ckpt_interval: 5000
best_ckpt_interval: 1000
best_ckpt_min_step: 1000

lr: 5.0e-5
weight_decay: 1.0e-3
grad_clip_norm: 1.0
dropout: 0.1

num_inference_timesteps: 15
inference_tau_schedule: midpoint
avoid_endpoint_tau: true

lr_groups:
  flow_matching_action_head: 5.0e-5
  action_expert: 5.0e-5
  flow_time_embedding: 1.0e-4
  timestep_mlp: 1.0e-4
  noisy_action_encoder: 1.0e-4
  bridge_attention: 1.0e-4
  bridge_adapter: 1.0e-4
  short_memory_encoder: 1.0e-4
  short_memory_projector: 1.0e-4
  plan_projector: 1.0e-4
  progress_condition_projector: 1.0e-4
  source_mlp: 1.0e-4
  gates: 5.0e-5
  action_pos_embedding: 5.0e-5
  temporal_pos_embedding: 5.0e-5
