experiment_name: bridge_himem_base
seed: 42

vlm:
  hidden_dim: 896
  raw_dim:
  raw_layers: [3, 7, 11, 14]
  freeze: true
  allow_image_token_truncation: false

action_query:
  source: learned_bridge
  num_tokens: 64

bridge:
  enabled: false
  variant: crosskv
  num_layers: 4
  num_heads: 8
  num_action_tokens: 16
  dropout: 0.0
  raw_gate_init: 0.0
  ffn_mult: 4

context:
  mode: fused_only
  fused_gate_init: 0.0

memory:
  enabled: false
  kind: dual_fifo_visual
  hidden_dim: 896
  views: [base, wrist]
  short:
    capacity: 2
    offsets: [8, 16]
  long:
    capacity: 4
  compression:
    entry_tokens: 1
    num_heads: 8
    dropout: 0.0
    max_age_steps: 512

skill:
  enabled: false
  num_tokens: 4

coarse_planner:
  enabled: false
  type: query_cross_attention
  hidden_dim: 896
  num_layers: 4
  num_heads: 8
  num_plan_steps: 1
  planning_horizon: 32
  latent_dim: 128
  latent_head_hidden_dim: 512
  segment_action_dim: 7
  dropout: 0.05
  loss: intent_latent
  loss_weight: 0.2
  latent_loss_weight: 1.0
  chunk_loss_weight: 0.25
  gripper_loss_weight: 2.0
  segment_autoencoder_checkpoint:
  input_memory: false
  placement: bridge_crosskv
  gripper_indices: [-1]
