# CALVIN training profile for HiMem-Bridge-VLA.
#
# Expected training data format:
# - LeRobot-style CALVIN conversion under datasets/calvin/lerobot/task_D_D
# - optional boundary sidecar generated from original CALVIN auto_lang_ann.npy:
#   datasets/calvin/annotations/task_D_D_boundaries.jsonl
#
# The calvin adapter accepts both canonical LeRobot keys
# (observation.state/action/observation.images.*) and RoboTron/StarVLA CALVIN
# keys (state/actions/image/wrist_image).

max_action_dim: 24
max_state_dim: 24
max_views: 3

data_groups:
  calvin_franka:
    Calvin_Task_D_D:
      path: datasets/calvin/lerobot/task_D_D
      adapter: calvin
      boundary_path: datasets/calvin/annotations/task_D_D_boundaries.jsonl
      fps: 30
      state_keys:
        - observation.state
        - state
      action_keys:
        - action
        - actions
      task_keys:
        - task_index
        - annotation.human.action.task_description
      frame_keys:
        - frame_index
        - frame_idx
      global_frame_keys:
        - index
        - global_index
        - global_frame_idx
      episode_keys:
        - episode_index
        - episode_id
      view_map:
        image_1:
          - observation.images.image
          - observation.images.image_0
          - image
        image_2:
          - observation.images.wrist_image
          - wrist_image
