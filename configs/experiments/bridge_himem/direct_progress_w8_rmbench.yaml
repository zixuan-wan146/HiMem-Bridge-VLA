extends: ../../models/bridge_himem/base.yaml

experiment_name: direct_progress_w8_rmbench

bridge:
  enabled: true
  variant: direct
  num_layers: 8
  num_heads: 8

context:
  mode: fused_only

memory:
  enabled: false
  short:
    capacity: 2
    offsets: [16, 8]
  compression:
    entry_tokens: 16

progress_planner:
  enabled: true
  checkpoint:
  finetune: false
  hidden_dim: 896
  state_dim: 16
  action_dim: 14
  replan_stride: 16

action_head:
  kind: flowmatching
  horizon: 32
  per_action_dim: 14
  ffn_dim: 3584
  num_plan_slots: 8
  visual_gate_lambda: 0.5
  plan_gate_lambda: 0.25
  short_memory_time_bins: 4
