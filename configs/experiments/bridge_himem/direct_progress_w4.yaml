extends: ../../models/bridge_himem/base.yaml

experiment_name: direct_progress_w4

bridge:
  enabled: true
  variant: direct
  num_layers: 8
  num_heads: 8

context:
  mode: fused_only

memory:
  enabled: false
  short:
    capacity: 2
    offsets: [16, 8]
  compression:
    entry_tokens: 16

progress_planner:
  enabled: true
  checkpoint: local_data/runs/progress_warmup/libero_progress_state_planner_h32_r16_w4_bs12800_epval_v1/best.pt
  finetune: false
  hidden_dim: 896
  state_dim: 8
  action_dim: 7
  replan_stride: 16

action_head:
  kind: flowmatching
  horizon: 32
  per_action_dim: 7
  ffn_dim: 3584
  num_plan_slots: 8
  visual_gate_lambda: 0.5
  plan_gate_lambda: 0.25
  short_memory_time_bins: 4
