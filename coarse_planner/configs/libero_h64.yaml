seed: 42

data:
  format: planner_feature_cache
  root: /root/autodl-tmp/datasets/coarse_planner/libero_h64
  manifest: manifest.json
  shard_cache_size: 8
  max_samples_per_shard: 256
  val_fraction: 0.1
  split_by: episode

target:
  planning_horizon: 64
  num_plan_steps: 8
  chunk_size: 8
  action_convention: relative
  motion_indices: [0, 1, 2, 3, 4, 5]
  gripper_indices: [6]

model:
  hidden_dim: auto
  action_dim: auto
  state_dim: auto
  num_layers: 3
  num_heads: 8
  dropout: 0.0
  ffn_mult: 4

training:
  batch_size: 512
  epochs: 8
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  grad_clip_norm: 1.0

loss:
  gripper_indices: [6]
  gripper_loss_weight: 2.0
  smoothness_weight: 0.01

outputs:
  run_dir: /root/autodl-tmp/runs/coarse_planner/libero_h64
