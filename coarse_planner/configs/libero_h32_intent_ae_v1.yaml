seed: 42

data:
  format: planner_feature_cache
  root: ../datasets/coarse_planner/libero_h32_single_token_s32768_seed42_action_only
  manifest: manifest.json
  fields: [action_segments, action_segment_mask]
  shard_cache_size: 64
  max_samples_per_shard: 256
  val_fraction: 0.1
  split_by: episode

target:
  planning_horizon: 32
  num_plan_steps: 1
  chunk_size: 32
  gripper_indices: [6]

segment_autoencoder:
  checkpoint: null
  latent_dim: 128
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  ffn_dim: 512
  dropout: 0.05
  gripper_dim: 1
  distance_loss_weight: 0.1
  dct_low_frequency: 8
  endpoint_distance_weight: 0.5
  gripper_distance_weight: 0.25

training:
  batch_size: 11264
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  grad_clip_norm: 1.0
  amp: true
  early_stopping_patience: 12
  early_stopping_min_delta: 0.0001

loss:
  gripper_indices: [6]
  gripper_loss_weight: 2.0
  latent_loss_weight: 1.0
  chunk_loss_weight: 0.25
  loss_on_active_suffix_only: false

outputs:
  segment_ae_run_dir: ../runs/coarse_planner/libero_h32_intent_ae_v1
  run_dir: ../runs/coarse_planner/libero_h32_intent_ae_v1
