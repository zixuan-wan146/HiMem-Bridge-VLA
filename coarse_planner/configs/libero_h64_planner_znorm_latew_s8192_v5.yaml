seed: 42

data:
  format: planner_feature_cache
  root: /root/autodl-tmp/datasets/coarse_planner/libero_h64_s8192_seed42
  manifest: manifest.json
  shard_cache_size: 64
  max_samples_per_shard: 256
  val_fraction: 0.1
  split_by: episode

target:
  planning_horizon: 64
  num_plan_steps: 8
  chunk_size: 8
  gripper_indices: [6]

segment_autoencoder:
  checkpoint: /root/autodl-tmp/runs/coarse_planner/libero_h64_segment_ae_v2/best.pt
  latent_dim: 128
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  ffn_dim: 512
  dropout: 0.05
  gripper_dim: 1
  distance_loss_weight: 0.1
  dct_low_frequency: 4
  endpoint_distance_weight: 0.5
  gripper_distance_weight: 0.25

model:
  hidden_dim: auto
  state_dim: auto
  latent_dim: null
  num_layers: 4
  num_heads: 8
  dropout: 0.05
  ffn_mult: 4
  latent_head_hidden_dim: 512

latent_normalization:
  enabled: true
  stats_path: /root/autodl-tmp/runs/coarse_planner/libero_h64_planner_znorm_chunk1_v4/latent_normalizer.pt
  reuse_existing_stats: true
  std_floor: 0.0001

initialization:
  resume_from: /root/autodl-tmp/runs/coarse_planner/libero_h64_planner_znorm_chunk1_v4/best.pt
  convert_raw_latent_head: false
  reset_optimizer: true
  reset_best: true
  reset_epoch: true

training:
  batch_size: 640
  epochs: 80
  lr: 0.00005
  weight_decay: 0.0001
  num_workers: 0
  grad_clip_norm: 1.0
  amp: true

loss:
  gripper_indices: [6]
  gripper_loss_weight: 2.0
  latent_loss_weight: 1.0
  chunk_loss_weight: 1.0
  loss_on_active_suffix_only: false
  token_loss_weights: [1.0, 1.0, 1.05, 1.1, 1.2, 1.35, 1.5, 1.6]

evaluation:
  holdout_root: /root/autodl-tmp/datasets/coarse_planner/libero_h64_holdout_seed43
  consumed_tokens_set: [0, 2, 4, 6]

outputs:
  run_dir: /root/autodl-tmp/runs/coarse_planner/libero_h64_planner_znorm_latew_s8192_v5
  segment_ae_run_dir: /root/autodl-tmp/runs/coarse_planner/libero_h64_segment_ae_v2
