seed: 42

data:
  format: planner_feature_cache
  root: /root/autodl-tmp/datasets/coarse_planner/libero_h48
  manifest: manifest.json
  shard_cache_size: 8
  max_samples_per_shard: 256
  val_fraction: 0.1
  split_by: episode

target:
  planning_horizon: 48
  num_plan_steps: 6
  chunk_size: 8
  gripper_indices: [6]

segment_autoencoder:
  checkpoint: /root/autodl-tmp/runs/coarse_planner/libero_h48_segment_ae/best.pt
  latent_dim: 64
  hidden_dim: 256
  num_layers: 2
  dropout: 0.0
  distance_loss_weight: 0.1
  dct_low_frequency: 4
  endpoint_distance_weight: 1.0
  gripper_distance_weight: 1.0

model:
  hidden_dim: auto
  state_dim: auto
  latent_dim: null
  num_layers: 3
  num_heads: 8
  dropout: 0.0
  ffn_mult: 4

training:
  batch_size: 512
  epochs: 8
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  grad_clip_norm: 1.0

loss:
  gripper_indices: [6]
  gripper_loss_weight: 2.0
  latent_loss_weight: 1.0
  chunk_loss_weight: 1.0

outputs:
  run_dir: /root/autodl-tmp/runs/coarse_planner/libero_h48
  segment_ae_run_dir: /root/autodl-tmp/runs/coarse_planner/libero_h48_segment_ae
