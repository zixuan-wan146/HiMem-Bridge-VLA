seed: 7

data:
  format: planner_feature_cache
  root: /root/autodl-tmp/datasets/coarse_planner/smoke
  manifest: manifest.json
  input_paths: []
  stride: 1
  include_tail: false
  max_samples_per_shard: 8
  val_fraction: 0.5

target:
  num_plan_steps: 2
  planning_horizon: 4
  action_convention: relative
  gripper_indices: [-1]

model:
  hidden_dim: auto
  action_dim: auto
  state_dim: auto
  num_layers: 3
  num_heads: 2
  dropout: 0.0

training:
  batch_size: 4
  epochs: 1
  lr: 0.001
  weight_decay: 0.0
  num_workers: 0
  grad_clip_norm: 1.0

loss:
  gripper_indices: [-1]
  gripper_loss_weight: 1.0
  smoothness_weight: 0.0

outputs:
  run_dir: /root/autodl-tmp/runs/coarse_planner/smoke
