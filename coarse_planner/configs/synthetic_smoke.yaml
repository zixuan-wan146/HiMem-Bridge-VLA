seed: 7

data:
  format: planner_feature_cache
  root: ../datasets/coarse_planner/smoke
  manifest: manifest.json
  input_paths: []
  stride: 1
  include_tail: false
  max_samples_per_shard: 8
  val_fraction: 0.5

target:
  num_plan_steps: 2
  planning_horizon: 4
  gripper_indices: [-1]

segment_autoencoder:
  checkpoint: ../runs/coarse_planner/smoke_segment_ae/best.pt
  latent_dim: 4
  hidden_dim: 16
  num_layers: 1
  num_heads: 2
  ffn_dim: 64
  dropout: 0.0
  gripper_dim: 1
  distance_loss_weight: 0.1
  dct_low_frequency: 2
  endpoint_distance_weight: 1.0
  gripper_distance_weight: 1.0

model:
  hidden_dim: auto
  state_dim: auto
  latent_dim: null
  num_layers: 3
  num_heads: 2
  dropout: 0.0
  ffn_mult: 4
  latent_head_hidden_dim: 16

training:
  batch_size: 4
  epochs: 1
  lr: 0.001
  weight_decay: 0.0
  num_workers: 0
  grad_clip_norm: 1.0
  amp: true

loss:
  gripper_indices: [-1]
  gripper_loss_weight: 1.0
  latent_loss_weight: 1.0
  chunk_loss_weight: 0.25
  loss_on_active_suffix_only: false

outputs:
  run_dir: ../runs/coarse_planner/smoke
  segment_ae_run_dir: ../runs/coarse_planner/smoke_segment_ae
