seed: 42

data:
  format: planner_feature_cache
  root: /root/autodl-tmp/datasets/coarse_planner/default
  manifest: manifest.json
  input_paths: []
  stride: 1
  include_tail: true
  max_samples_per_shard: 4096
  val_fraction: 0.1
  split_by: episode

target:
  num_plan_steps: 8
  planning_horizon: 64
  execution_horizon: 16
  suffix_stride_tokens: 2
  gripper_indices: [-1]

segment_autoencoder:
  checkpoint: null
  latent_dim: 128
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  ffn_dim: 512
  dropout: 0.05
  gripper_dim: 1
  distance_loss_weight: 0.1
  dct_low_frequency: 4
  endpoint_distance_weight: 0.5
  gripper_distance_weight: 0.25

model:
  hidden_dim: auto
  state_dim: auto
  latent_dim: null
  num_layers: 4
  num_heads: 8
  dropout: 0.05
  ffn_mult: 4
  latent_head_hidden_dim: 512

training:
  batch_size: 64
  epochs: 20
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 4
  grad_clip_norm: 1.0
  amp: true

loss:
  gripper_indices: [-1]
  gripper_loss_weight: 2.0
  latent_loss_weight: 1.0
  chunk_loss_weight: 0.25
  loss_on_active_suffix_only: false

outputs:
  run_dir: /root/autodl-tmp/runs/coarse_planner/default
  segment_ae_run_dir: /root/autodl-tmp/runs/coarse_planner/default_segment_ae
