  num_plan_steps: 8
  gripper_indices: [6]

segment_autoencoder:
  checkpoint: null
  latent_dim: 128
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  ffn_dim: 512
  dropout: 0.05
  gripper_dim: 1
  distance_loss_weight: 0.1
