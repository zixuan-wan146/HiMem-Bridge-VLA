  manifest: manifest.json
  shard_cache_size: 8
  max_samples: 2048
  max_samples_per_shard: 256
  val_fraction: 0.1
  split_by: episode

feature:
  source: fused
  hidden_state_layer: deep
  model_name: /root/autodl-tmp/hf-home/hub/models--OpenGVLab--InternVL3-1B/snapshots/4415a3b810e636d11dfa86b0e9ba40bb00535aa8
  image_size: 448
  allow_image_token_truncation: false
  storage_dtype: float16

libero:
  dataset_root: /root/autodl-tmp/libero/datasets
  suites:
    - libero_spatial
    - libero_object
    - libero_goal
    - libero_10
  horizons: [64]
