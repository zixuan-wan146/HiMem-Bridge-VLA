  num_heads: 8
  dropout: 0.05
  ffn_mult: 4
  latent_head_hidden_dim: 512

training:
  batch_size: 512
  epochs: 8
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  grad_clip_norm: 1.0
  amp: true

loss:
  gripper_indices: [6]
  gripper_loss_weight: 2.0
  latent_loss_weight: 1.0
  chunk_loss_weight: 0.25
  loss_on_active_suffix_only: false

outputs:
